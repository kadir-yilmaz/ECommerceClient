<section class="home-page">
  <section class="featured-products">
    <div class="section-title">
      <div>
        <p>SEZONUN SECIMI</p>
        <h2>One Cikan Urunler</h2>
      </div>
      <a routerLink="/products">Tumunu Gor</a>
    </div>

    <div class="product-grid" *ngIf="featuredProducts.length; else noProducts">
      <app-product-card
        *ngFor="let product of featuredProducts"
        [product]="product"
        [baseUrl]="baseUrl?.url"
        variant="compact"
        [showAddToCart]="true"
        (addToCart)="addToBasket($event)">
      </app-product-card>
    </div>

    <ng-template #noProducts>
      <p class="empty-state">Henuz urun bulunamadi.</p>
    </ng-template>
  </section>

  <section class="quick-highlights">
    <article>
      <h3>Ayni Gun Kargo</h3>
      <p>16:00 oncesi siparislerde hizli hazirlama sureci.</p>
    </article>
    <article>
      <h3>Guvenli Odeme</h3>
      <p>3D secure ve taksit secenekleri ile guvenli alisveris.</p>
    </article>
    <article>
      <h3>Canli Stok Takibi</h3>
      <p>Stok ve fiyat degisimleri anlik olarak guncellenir.</p>
    </article>
  </section>
</section>
