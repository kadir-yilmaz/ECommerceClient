<h2 mat-dialog-title>Şifre Değiştir</h2>

<mat-dialog-content>
  <form class="password-form">
    <div class="form-group">
      <label for="oldPassword">Mevcut Şifre</label>
      <input 
        type="password" 
        id="oldPassword" 
        [(ngModel)]="passwordData.oldPassword" 
        name="oldPassword"
        autocomplete="current-password"
        class="form-control">
    </div>

    <div class="form-group">
      <label for="newPassword">Yeni Şifre</label>
      <input 
        type="password" 
        id="newPassword" 
        [(ngModel)]="passwordData.newPassword" 
        name="newPassword"
        autocomplete="new-password"
        class="form-control">
    </div>

    <div class="form-group">
      <label for="confirmPassword">Yeni Şifre (Tekrar)</label>
      <input 
        type="password" 
        id="confirmPassword" 
        [(ngModel)]="passwordData.confirmPassword" 
        name="confirmPassword"
        autocomplete="new-password"
        class="form-control">
    </div>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">İptal</button>
  <button mat-raised-button color="primary" (click)="changePassword()">Değiştir</button>
</mat-dialog-actions>
