<section class="auth-section">
  <div class="auth-container">
    <div class="glass-auth-card">
      <div class="auth-tabs">
        <a routerLink="/login" routerLinkActive="active" class="auth-tab">Giriş Yap</a>
        <a routerLink="/register" routerLinkActive="active" class="auth-tab">Üye Ol</a>
      </div>
      
      <div class="auth-content">
        <h2 class="card-title">Hesap Oluştur</h2>
        <p class="card-subtitle">Ayrıcalıklı alışveriş dünyasına katılın.</p>

        <form [formGroup]="frm" (ngSubmit)="onSubmit(frm.value)" class="auth-form" autocomplete="off">
          <div class="input-row">
            <div class="input-group">
              <span class="input-icon"><i class="fa-solid fa-envelope"></i></span>
              <input formControlName="email" type="email" placeholder="E-posta" autocomplete="off"
                [ngClass]="{'is-invalid': submitted && f.email.errors}">
            </div>
          </div>

          <div class="input-row">
            <div class="input-group">
              <span class="input-icon"><i class="fa-solid fa-lock"></i></span>
              <input formControlName="password" [type]="hidePassword ? 'password' : 'text'" placeholder="Şifre (en az 6 karakter)" autocomplete="new-password" class="password-input"
                [ngClass]="{'is-invalid': submitted && f.password.errors}">
              <span class="input-icon-right" (click)="hidePassword = !hidePassword">
                <i class="fa-solid" [ngClass]="hidePassword ? 'fa-eye-slash' : 'fa-eye'"></i>
              </span>
            </div>
          </div>

          <div class="input-row">
            <div class="input-group">
              <span class="input-icon"><i class="fa-solid fa-shield-halved"></i></span>
              <input formControlName="passwordConfirm" [type]="hidePasswordConfirm ? 'password' : 'text'" placeholder="Şifre Tekrar" autocomplete="new-password" class="password-input"
                [ngClass]="{'is-invalid': submitted && f.passwordConfirm.errors}">
              <span class="input-icon-right" (click)="hidePasswordConfirm = !hidePasswordConfirm">
                <i class="fa-solid" [ngClass]="hidePasswordConfirm ? 'fa-eye-slash' : 'fa-eye'"></i>
              </span>
            </div>
          </div>

          <button type="submit" class="btn-primary-auth">
            Hesabımı Oluştur
          </button>
        </form>
      </div>
    </div>
  </div>
</section>
