<article class="ty-product-card" *ngIf="product">
  <div class="ty-card-image" 
       (mousemove)="onImageMouseMove($event)" 
       (mouseenter)="onImageMouseEnter()" 
       (mouseleave)="onImageMouseLeave()">
       
    <!-- Kampanya rozetleri -->
    <div class="ty-badge-container" *ngIf="product.stock > 50">
      <div class="ty-badge circle-badge">
        <span>EN ÇOK</span>
        <span>SATAN</span>
      </div>
    </div>
    
    <!-- Favori Butonu -->
    <button type="button" class="ty-fav-btn" [class.active]="isFavorite" (click)="onToggleFavorite($event)">
      <i class="fa-solid fa-heart" *ngIf="isFavorite"></i>
      <i class="fa-regular fa-heart" *ngIf="!isFavorite"></i>
    </button>
    
    <!-- Hızlı Bakış Butonu -->
    <button type="button" class="ty-quick-view-btn" *ngIf="hoveringImage">
      <i class="fa-solid fa-eye"></i> Hızlı Bakış
    </button>
    
    <a [routerLink]="['/products/detail', product?.id]" class="ty-img-link">
      <img [src]="currentImageSource" [alt]="product.name" (error)="onImageError()">
    </a>

    <!-- Slider Dots -->
    <div class="ty-slider-dots" *ngIf="allImages.length > 1">
      <span class="dot" *ngFor="let img of allImages; let i = index" [class.active]="i === activeImageIndex"></span>
    </div>
  </div>


  <div class="ty-card-body">
    <a [routerLink]="['/products/detail', product?.id]" class="ty-title-link">
      <div class="ty-title-wrapper">
        <span class="ty-brand">{{ brandName }} <i class="fa-solid fa-circle-check brand-tick"></i></span>
        <span class="ty-name">{{ formattedProductName }}</span>
      </div>
    </a>
    

    <!-- Değerlendirme Satırı -->
    <div class="ty-rating-row">
      <span class="rating-score">{{ rating | number:'1.1-1' }}</span>
      <div class="stars">
        <i class="fa-solid fa-star"></i>
        <i class="fa-solid fa-star"></i>
        <i class="fa-solid fa-star"></i>
        <i class="fa-solid fa-star"></i>
        <i class="fa-solid fa-star-half-stroke"></i>
      </div>
      <span class="rating-text">({{ reviewCount }})</span>
    </div>
    
    <div class="ty-stock-badge" [ngClass]="product.stock < 20 ? 'stock-low' : 'stock-ok'">
      <i class="fa-solid" [ngClass]="product.stock < 20 ? 'fa-triangle-exclamation' : 'fa-box-open'"></i>
      <span *ngIf="product.stock > 0">Stokta {{ product.stock }} adet</span>
      <span *ngIf="product.stock <= 0">Stokta yok</span>
    </div>

    <!-- Fiyatlar -->
    <div class="ty-price-container">
      <div class="ty-new-price">
        <span class="ty-price-value">{{ product.price | turkishCurrency }}</span>
        <span class="ty-old-price">{{ originalPrice | turkishCurrency }}</span>
      </div>
    </div>

    <!-- Sepete Ekle Butonu -->
    <button type="button" class="ty-cart-btn" [class.in-cart]="inCart" (click)="onAddToCart($event)" *ngIf="showAddToCart">
      <ng-container *ngIf="!inCart">
        Sepete Ekle
      </ng-container>
      <ng-container *ngIf="inCart">
        <i class="fa-solid fa-check"></i> Sepette
      </ng-container>
    </button>
  </div>
</article>
