<div class="page-header d-flex justify-content-between align-items-center mb-4">
  <h2 class="text-dark m-0" style="font-weight: 700;">Edit Product</h2>
  <button mat-flat-button routerLink="/admin/products">
    <mat-icon>arrow_back</mat-icon> Back to List
  </button>
</div>

<div class="card shadow-sm" *ngIf="product">
  <div class="card-body p-4">
    <mat-form-field appearance="outline" class="w-100 mb-3">
      <mat-label>Name</mat-label>
      <input matInput #txtName [value]="product.name">
    </mat-form-field>

    <div class="row">
      <div class="col-md-6">
        <mat-form-field appearance="outline" class="w-100 mb-3">
          <mat-label>Stock</mat-label>
          <input matInput type="number" min="0" [value]="product.stock" #txtStock>
        </mat-form-field>
      </div>
      <div class="col-md-6">
        <mat-form-field appearance="outline" class="w-100 mb-3">
          <mat-label>Price</mat-label>
          <input matInput type="number" min="0" [value]="product.price" #txtPrice>
        </mat-form-field>
      </div>
    </div>

    <!-- Existing Images -->
    <div class="mb-4" *ngIf="existingImages && existingImages.length > 0">
      <label class="form-label fw-bold mb-2">Current Images</label>
      <div class="d-flex flex-wrap gap-3">
        <div *ngFor="let img of existingImages; let i = index" class="position-relative"
          style="width: 120px; height: 120px;">
          <img [src]="getImageUrl(img.path)" class="img-thumbnail"
            style="width: 100%; height: 100%; object-fit: cover; border-radius: 8px;"
            [class.border-primary]="img.showcase" [style.border-width]="img.showcase ? '3px' : '1px'">
          <button class="btn btn-sm btn-danger position-absolute top-0 end-0 rounded-circle p-0"
            style="width: 24px; height: 24px; line-height: 1; transform: translate(30%, -30%);"
            (click)="deleteExistingImage(img.id, i)">
            &times;
          </button>
          <span *ngIf="img.showcase"
            class="badge bg-primary position-absolute bottom-0 start-50 translate-middle-x mb-1"
            style="font-size: 10px;">Showcase</span>
        </div>
      </div>
    </div>

    <div *ngIf="existingImages && existingImages.length === 0" class="mb-4">
      <p class="text-muted">No images attached to this product yet.</p>
    </div>

    <!-- New Images -->
    <div class="mb-3">
      <label class="form-label fw-bold">Add New Images</label>
      <input class="form-control" type="file" multiple accept="image/*"
        (change)="onFileSelected($event)">
    </div>

    <div class="d-flex flex-wrap gap-3 mt-3" *ngIf="newImagePreviews.length > 0">
      <div *ngFor="let preview of newImagePreviews; let i = index" class="position-relative"
        style="width: 120px; height: 120px;">
        <img [src]="preview" class="img-thumbnail"
          style="width: 100%; height: 100%; object-fit: cover; border-radius: 8px;">
        <button class="btn btn-sm btn-danger position-absolute top-0 end-0 rounded-circle p-0"
          style="width: 24px; height: 24px; line-height: 1; transform: translate(30%, -30%);"
          (click)="removeNewImage(i)">
          &times;
        </button>
      </div>
    </div>

    <div class="d-flex justify-content-end mt-4 gap-2">
      <button mat-flat-button routerLink="/admin/products">Cancel</button>
      <button mat-flat-button color="primary" (click)="update(txtName, txtStock, txtPrice)">
        <mat-icon>save</mat-icon> Update Product
      </button>
    </div>
  </div>
</div>
