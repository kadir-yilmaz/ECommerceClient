<div class="authorize-menu-container">
  <div class="header">
    <h1>Rol Yetkilendirme</h1>
    <div class="actions">
      <mat-form-field appearance="outline" class="role-selector">
        <mat-label>Rol Seçin</mat-label>
        <mat-select [(value)]="selectedRole" (selectionChange)="onRoleChange()">
          <mat-option *ngFor="let role of allRoles" [value]="role">
            {{role.name}}
          </mat-option>
        </mat-select>
      </mat-form-field>
      <button mat-raised-button color="warn" (click)="cancelChanges()" [disabled]="!hasChanges || !selectedRole">
        İptal
      </button>
      <button mat-raised-button color="primary" (click)="saveChanges()" [disabled]="!hasChanges || !selectedRole">
        Kaydet
      </button>
    </div>
  </div>

  <div class="content" *ngIf="selectedRole">
    <div class="info-banner">
      <mat-icon>info</mat-icon>
      <span><strong>{{selectedRole.name}}</strong> rolü için yetkileri seçin</span>
    </div>

    <mat-tree [dataSource]="dataSource" [treeControl]="treeControl" class="endpoint-tree">
      <!-- Leaf node (Endpoint) -->
      <mat-tree-node *matTreeNodeDef="let node" matTreeNodePadding>
        <button mat-icon-button disabled></button>
        <mat-checkbox 
          [checked]="node.selected"
          (change)="onCheckboxChange(node)"
          class="endpoint-checkbox">
          {{node.name}}
        </mat-checkbox>
      </mat-tree-node>

      <!-- Parent node (Menu) -->
      <mat-tree-node *matTreeNodeDef="let node;when: hasChild" matTreeNodePadding>
        <button mat-icon-button matTreeNodeToggle
                [attr.aria-label]="'Toggle ' + node.name">
          <mat-icon class="mat-icon-rtl-mirror">
            {{treeControl.isExpanded(node) ? 'expand_more' : 'chevron_right'}}
          </mat-icon>
        </button>
        <span class="menu-name">{{node.name}}</span>
      </mat-tree-node>
    </mat-tree>
  </div>

  <div class="empty-state" *ngIf="!selectedRole">
    <mat-icon>security</mat-icon>
    <p>Yetkileri düzenlemek için yukarıdan bir rol seçin</p>
  </div>
</div>
