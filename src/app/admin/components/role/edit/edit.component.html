<div class="edit-role-dialog">
  <h2 mat-dialog-title>
    <mat-icon>shield</mat-icon>
    Rol Yetkilerini Düzenle
  </h2>

  <mat-dialog-content>
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Rol Adı</mat-label>
      <input matInput [(ngModel)]="roleName" placeholder="Rol adını girin">
      <mat-icon matPrefix>badge</mat-icon>
    </mat-form-field>

    <div class="permissions-section-new">
      <h3>
        <mat-icon>lock_open</mat-icon>
        Endpoint Yetkileri
      </h3>
      <p class="hint">
        <mat-icon>info</mat-icon>
        Bu role atanacak endpoint yetkilerini seçin. Seçilen endpoint'lere bu role sahip kullanıcılar erişebilir.
      </p>

      <div class="menu-groups-grid">
        <div class="menu-group-card" *ngFor="let menu of dataSource.data">
          <div class="menu-group-header">
            <mat-icon class="group-icon">folder_open</mat-icon>
            <h4>{{ menu.name }}</h4>
          </div>
          
          <div class="menu-group-endpoints">
            <div class="endpoint-item" *ngFor="let action of menu.actions">
              <mat-checkbox 
                [(ngModel)]="action.selected"
                (change)="hasChanges = true"
                class="endpoint-checkbox-new"
                color="primary">
                {{ action.name }}
              </mat-checkbox>
              
              <span class="endpoint-badge" 
                    [class.badge-get]="action.code?.startsWith('GET')" 
                    [class.badge-post]="action.code?.startsWith('POST')" 
                    [class.badge-delete]="action.code?.startsWith('DELETE')"
                    [class.badge-put]="action.code?.startsWith('PUT')">
                {{ action.code?.split('.')[0] || 'API' }}
              </span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button (click)="cancel()" color="warn">
      <mat-icon>close</mat-icon>
      İptal
    </button>
    <button mat-raised-button color="primary" (click)="save()">
      <mat-icon>save</mat-icon>
      Kaydet
    </button>
  </mat-dialog-actions>
</div>
