<div class="edit-role-dialog">
  <h2 mat-dialog-title>
    <mat-icon>edit</mat-icon>
    Rol Düzenle
  </h2>

  <mat-dialog-content>
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Rol Adı</mat-label>
      <input matInput [(ngModel)]="roleName" placeholder="Rol adını girin">
      <mat-icon matPrefix>badge</mat-icon>
    </mat-form-field>

    <div class="permissions-section">
      <h3>
        <mat-icon>lock_open</mat-icon>
        Endpoint Yetkileri
      </h3>
      <p class="hint">
        <mat-icon>info</mat-icon>
        Bu role atanacak endpoint yetkilerini seçin. Seçilen endpoint'lere bu role sahip kullanıcılar erişebilir.
      </p>

      <mat-tree [dataSource]="dataSource" [treeControl]="treeControl" class="endpoint-tree">
        <!-- Leaf node (Endpoint) -->
        <mat-tree-node *matTreeNodeDef="let node" matTreeNodePadding>
          <button mat-icon-button disabled></button>
          <mat-checkbox 
            [checked]="node.selected"
            (change)="onCheckboxChange(node)"
            class="endpoint-checkbox"
            color="primary">
            {{node.name}}
          </mat-checkbox>
        </mat-tree-node>

        <!-- Parent node (Menu) -->
        <mat-tree-node *matTreeNodeDef="let node;when: hasChild" matTreeNodePadding>
          <button mat-icon-button matTreeNodeToggle
                  [attr.aria-label]="'Toggle ' + node.name">
            <mat-icon class="mat-icon-rtl-mirror">
              {{treeControl.isExpanded(node) ? 'expand_more' : 'chevron_right'}}
            </mat-icon>
          </button>
          <span class="menu-name">
            <mat-icon>folder</mat-icon>
            {{node.name}}
          </span>
        </mat-tree-node>
      </mat-tree>
    </div>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button (click)="cancel()" color="warn">
      <mat-icon>close</mat-icon>
      İptal
    </button>
    <button mat-raised-button color="primary" (click)="save()">
      <mat-icon>save</mat-icon>
      Kaydet
    </button>
  </mat-dialog-actions>
</div>
