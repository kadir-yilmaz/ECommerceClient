<div class="roles-table-container">
  <table mat-table [dataSource]="dataSource" class="roles-table">

    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef> Rol Adı </th>
      <td mat-cell *matCellDef="let element" class="role-name">
        <mat-icon class="role-icon">security</mat-icon>
        <span>{{element.name}}</span>
      </td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef class="actions-header">İşlemler</th>
      <td mat-cell *matCellDef="let element" class="actions-cell">
        <button mat-icon-button color="primary" (click)="editPermissions(element)" 
                matTooltip="Yetkileri Düzenle">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button color="warn" (click)="deleteRole(element, $event)" 
                matTooltip="Rolü Sil">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="role-row"></tr>
  </table>

  <mat-paginator (page)="pageChanged()"
                 [pageSizeOptions]="[5, 10, 20]"
                 showFirstLastButtons
                 aria-label="Rol sayfası seçin">
  </mat-paginator>
</div>
