<div class="profile-container">
  <div class="profile-header mb-4">
    <h2 class="text-dark m-0" style="font-weight: 700;">Profil Ayarları</h2>
    <p class="text-muted">Kişisel bilgilerinizi yönetin ve şifrenizi güncelleyin.</p>
  </div>

  <div class="row">
    <div class="col-md-4">
      <div class="profile-card mat-elevation-z4 p-4 text-center mb-4">
        <div class="avatar-large mb-3">{{userName?.charAt(0)}}</div>
        <h3 class="mb-1">{{userName}}</h3>
        <span class="badge badge-primary bg-primary mb-3">Admin</span>
        <div class="divider"></div>
        <p class="text-muted small mt-3">Hesap bilgileriniz güvenli bir şekilde saklanmaktadır.</p>
      </div>
    </div>

    <div class="col-md-8">
      <div class="profile-card mat-elevation-z4 p-4 mb-4">
        <h4 class="mb-4">Şifre Değiştir</h4>
        
        <div class="row">
          <div class="col-md-12 mb-3">
            <mat-form-field appearance="outline" class="w-100">
              <mat-label>Mevcut Şifre</mat-label>
              <input matInput type="password" placeholder="Mevcut şifrenizi giriniz" #oldPassword>
              <mat-icon matSuffix>lock</mat-icon>
            </mat-form-field>
          </div>

          <div class="col-md-6 mb-3">
            <mat-form-field appearance="outline" class="w-100">
              <mat-label>Yeni Şifre</mat-label>
              <input matInput type="password" placeholder="Yeni şifrenizi giriniz" #newPassword>
              <mat-icon matSuffix>vpn_key</mat-icon>
            </mat-form-field>
          </div>

          <div class="col-md-6 mb-3">
            <mat-form-field appearance="outline" class="w-100">
              <mat-label>Yeni Şifre (Tekrar)</mat-label>
              <input matInput type="password" placeholder="Yeni şifrenizi tekrar giriniz" #newPasswordConfirm>
              <mat-icon matSuffix>check_circle</mat-icon>
            </mat-form-field>
          </div>
        </div>

        <div class="d-flex justify-content-end mt-4">
          <button mat-flat-button color="primary" class="px-5 py-2" (click)="changePassword(oldPassword, newPassword, newPasswordConfirm)">
            Şifreyi Güncelle
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
